<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nintendo</title>
  <link rel="stylesheet" href="looks.css">
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <div class="brand-group">
        <div class="brand">Nintendo</div>
        <div class="top-links">
          <a href="#" class="icon-link">🧭 Explore</a>
          <a href="#" class="icon-link">🛒 Store</a>
          <a href="#" class="icon-link">❓ Support</a>
        </div>
      </div>
      <div class="header-actions">
        <div class="search-input">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search" />
        </div>
        <button class="icon-button">❤️</button>
        <button class="icon-button">🛒</button>
        <button class="login-button">Login / Sign Up</button>
        <div class="flag">🇨🇦</div>
      </div>
    </div>
  </header>

  <main>
    <section class="slider">
      <div class="slider-card">
        <div class="slide" id="sliderSlide">Page 1</div>
        <div class="slider-controls">
          <button class="pause-button" id="sliderPause">▶</button>
          <div class="slider-dots" id="sliderDots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="function.js"></script>
</body>
</html>
